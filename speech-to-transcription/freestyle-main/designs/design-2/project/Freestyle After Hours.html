<style>
  :root {
    --void:        #07080C;
    --ink:         #0E1016;
    --surface:     #161922;
    --surface-2:   #1F222C;
    --rule:        #262A35;
    --rule-soft:   #1C1F28;
    --text:        #ECE7DC;
    --text-soft:   #B5AD9E;
    --mute:        #6A6356;
    --lime:        #D8FF3D;
    --lime-deep:   #B6E020;
    --lime-soft:   rgba(216, 255, 61, 0.12);
    --blush:       #E8927C;
    --plum:        #6B5B8A;
  }
  html, body { background: var(--void); }
  body {
    margin: 0;
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--text);
    font-feature-settings: 'ss01';
    -webkit-font-smoothing: antialiased;
  }
  .serif {
    font-family: 'Instrument Serif', 'Times New Roman', serif;
    letter-spacing: -0.01em;
    line-height: 0.95;
  }
  .serif-italic {
    font-family: 'Instrument Serif', 'Times New Roman', serif;
    font-style: italic;
    letter-spacing: -0.005em;
    line-height: 0.95;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .glow-lime {
    text-shadow: 0 0 24px rgba(216, 255, 61, 0.55), 0 0 8px rgba(216, 255, 61, 0.4);
  }
</style>
